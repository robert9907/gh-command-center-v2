<!-- GH Scrapers (Chat 3) — IIFE exposing window.GHScrapers        -->
<!-- ============================================================ -->
<script>
/**
 * GH Command Center - AEO Scrapers
 * Baked into index.html as plain JS (no imports, no TypeScript).
 *
 * Exposes: window.GHScrapers = { runAll, scrapeReddit, scrapeMedicareGov, scrapeEhealth, scrapeCompetitors }
 *
 * Reddit runs direct from browser (permissive CORS).
 * medicare.gov + ehealth.com + competitors route through PHP proxy at:
 *   https://generationhealth.me/tools/scrape-proxy.php?url=...
 *
 * Each scraper returns QueryCandidate objects compatible with the
 * Citation Monitor v2.0 / AEO Pipeline schema.
 */
(function () {
  'use strict';

  const PROXY_URL = 'https://generationhealth.me/tools/scrape-proxy.php';
  const REQUEST_DELAY_MS = 1000;

  // -------------------------------------------------------------------------
  // Shared helpers
  // -------------------------------------------------------------------------

  const delay = (ms) => new Promise((r) => setTimeout(r, ms));

  function emptyCitationStatus() {
    return { claude: null, chatgpt: null, perplexity: null, gemini: null };
  }

  function makeCandidate({ id, query, source, intent, intentScore, category, upvotes }) {
    return {
      id,
      query,
      source,
      intent,
      intentScore,
      category,
      dateAdded: new Date().toISOString(),
      ...(upvotes !== undefined ? { upvotes } : {}),
      citationStatus: emptyCitationStatus(),
      competitors: [],
    };
  }

  function cleanText(s) {
    if (!s) return '';
    return s.replace(/\s+/g, ' ').trim();
  }

  function isPlausibleQuery(text) {
    if (!text) return false;
    const t = text.trim();
    return t.length >= 10 && t.length <= 160;
  }

  // Dedupe by normalized query text (keeps first occurrence)
  function dedupe(candidates) {
    const seen = new Set();
    const out = [];
    for (const c of candidates) {
      const key = c.query.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
      if (!key || seen.has(key)) continue;
      seen.add(key);
      out.push(c);
    }
    return out;
  }

  // Fetch HTML through the PHP proxy
  async function fetchViaProxy(targetUrl) {
    const proxied = `${PROXY_URL}?url=${encodeURIComponent(targetUrl)}`;

    try {
      const res = await fetch(proxied);

      if (!res.ok) {
        throw new Error(`Proxy HTTP ${res.status} for ${targetUrl}`);
      }

      const contentType = res.headers.get('content-type');
      if (!contentType || !contentType.includes('application/json')) {
        throw new Error(`Proxy returned non-JSON (${contentType || 'none'})`);
      }

      const data = await res.json();

      if (!data.ok) {
        throw new Error(`Proxy error: ${data.error || 'unknown'}`);
      }

      if (typeof data.html !== 'string') {
        throw new Error(`Proxy returned invalid HTML (type: ${typeof data.html})`);
      }

      return data.html;
    } catch (err) {
      if (err.message.includes('Failed to fetch')) {
        throw new Error(`Proxy unreachable. Check ${PROXY_URL} exists and has CORS headers.`);
      }
      throw err;
    }
  }

  function parseHTML(html) {
    if (!html || typeof html !== 'string') {
      throw new Error('Invalid HTML input');
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // DOMParser inserts <parsererror> on catastrophic failure
    const parseError = doc.querySelector('parsererror');
    if (parseError) {
      console.warn('[parseHTML] DOMParser error (continuing anyway):', parseError.textContent.slice(0, 100));
    }

    return doc;
  }

  // -------------------------------------------------------------------------
  // 1. Reddit scraper (direct fetch, Reddit JSON API is CORS-friendly)
  // -------------------------------------------------------------------------

  const REDDIT_SUBS = ['Medicare', 'HealthInsurance', 'personalfinance', 'NorthCarolina'];
  const REDDIT_KEYWORDS = [
    'medicare', 'medicaid', 'health insurance', 'turning 65',
    'enrollment', 'part d', 'part b', 'medigap', 'advantage plan',
  ];

  async function fetchSubredditPosts(subreddit) {
    const url = `https://www.reddit.com/r/${subreddit}/top.json?t=month&limit=100`;
    try {
      const res = await fetch(url, {
        headers: {
          'Accept': 'application/json',
          'User-Agent': 'GHCommandCenter/1.0 (Medicare broker research)',
        },
      });
      if (!res.ok) {
        console.warn(`[reddit] r/${subreddit} HTTP ${res.status}`);
        return [];
      }
      const data = await res.json();
      const children = data?.data?.children || [];
      return children.map((c) => ({
        id: c.data.id,
        title: c.data.title,
        upvotes: c.data.ups,
        subreddit: c.data.subreddit,
        created: new Date(c.data.created_utc * 1000).toISOString(),
        url: c.data.permalink,
      }));
    } catch (err) {
      console.warn(`[reddit] r/${subreddit} failed:`, err.message);
      return [];
    }
  }

  function cleanRedditTitle(title) {
    let t = title || '';
    t = t.replace(/^(ELI5|TIL|PSA|Question|Help|Advice needed|Update|Rant)\s*[:\-]\s*/i, '');
    t = t.replace(/\s+/g, ' ').trim();
    return t;
  }

  async function scrapeReddit() {
    const allPosts = [];
    for (const sub of REDDIT_SUBS) {
      const posts = await fetchSubredditPosts(sub);
      allPosts.push(...posts);
      await delay(REQUEST_DELAY_MS);
    }

    const filtered = allPosts.filter((p) => {
      const lower = p.title.toLowerCase();
      return REDDIT_KEYWORDS.some((kw) => lower.includes(kw));
    });

    const candidates = filtered.map((p) =>
      makeCandidate({
        id: `reddit-${p.id}`,
        query: cleanRedditTitle(p.title),
        source: 'reddit',
        intent: 'medium',
        intentScore: 5,
        category: 'local_decisions',
        upvotes: p.upvotes,
      })
    ).filter((c) => isPlausibleQuery(c.query));

    return dedupe(candidates);
  }

  // -------------------------------------------------------------------------
  // 2. medicare.gov scraper (via proxy)
  // -------------------------------------------------------------------------

  const MEDICARE_GOV_PAGES = [
    'https://www.medicare.gov/basics/get-started-with-medicare',
    'https://www.medicare.gov/basics/get-started-with-medicare/sign-up/when-can-i-sign-up-for-medicare',
    'https://www.medicare.gov/basics/costs/medicare-costs',
    'https://www.medicare.gov/health-drug-plans/health-plans/your-coverage-options',
    'https://www.medicare.gov/health-drug-plans/part-d',
  ];

  async function extractMedicareGovQueries(pageUrl) {
    const html = await fetchViaProxy(pageUrl);
    const doc = parseHTML(html);
    const out = [];
    const slug = pageUrl.replace(/\W+/g, '-').slice(0, 60);

    // Schema.org Question microdata
    doc.querySelectorAll('[itemtype*="Question"]').forEach((faq, idx) => {
      const q = cleanText(
        faq.querySelector('[itemprop="name"], h2, h3')?.textContent
      );
      if (isPlausibleQuery(q)) {
        out.push(makeCandidate({
          id: `medicare-gov-${slug}-faq-${idx}`,
          query: q,
          source: 'medicare_gov',
          intent: 'low',
          intentScore: 4,
          category: 'authority_builders',
        }));
      }
    });

    // Headings phrased as questions
    doc.querySelectorAll('h1, h2, h3').forEach((h, idx) => {
      const text = cleanText(h.textContent);
      if (text.includes('?') && isPlausibleQuery(text)) {
        out.push(makeCandidate({
          id: `medicare-gov-${slug}-h-${idx}`,
          query: text,
          source: 'medicare_gov',
          intent: 'low',
          intentScore: 3,
          category: 'authority_builders',
        }));
      }
    });

    return out;
  }

  async function scrapeMedicareGov() {
    const all = [];
    for (const url of MEDICARE_GOV_PAGES) {
      try {
        const queries = await extractMedicareGovQueries(url);
        all.push(...queries);
      } catch (err) {
        console.warn(`[medicare.gov] ${url} failed:`, err.message);
      }
      await delay(REQUEST_DELAY_MS);
    }
    return dedupe(all);
  }

  // -------------------------------------------------------------------------
  // 3. ehealth.com scraper (via proxy)
  // -------------------------------------------------------------------------

  const EHEALTH_PAGES = [
    'https://www.ehealthinsurance.com/medicare',
    'https://www.ehealthinsurance.com/medicare/medicare-advantage',
    'https://www.ehealthinsurance.com/medicare/supplement-insurance',
    'https://www.ehealthinsurance.com/medicare/part-d',
  ];

  async function extractEhealthQueries(pageUrl) {
    const html = await fetchViaProxy(pageUrl);
    const doc = parseHTML(html);
    const out = [];
    const slug = pageUrl.replace(/\W+/g, '-').slice(0, 60);

    // Page title minus site suffix
    const rawTitle = cleanText(doc.querySelector('title')?.textContent);
    if (rawTitle) {
      const title = rawTitle.replace(/\s*[\|\-–]\s*eHealth.*$/i, '').trim();
      if (isPlausibleQuery(title)) {
        out.push(makeCandidate({
          id: `ehealth-${slug}-title`,
          query: title,
          source: 'ehealth',
          intent: 'medium',
          intentScore: 6,
          category: 'authority_builders',
        }));
      }
    }

    // H1 / H2 headings
    doc.querySelectorAll('h1, h2').forEach((h, idx) => {
      const text = cleanText(h.textContent);
      if (isPlausibleQuery(text)) {
        out.push(makeCandidate({
          id: `ehealth-${slug}-h-${idx}`,
          query: text,
          source: 'ehealth',
          intent: 'medium',
          intentScore: 5,
          category: 'authority_builders',
        }));
      }
    });

    // FAQ-flavored containers
    doc.querySelectorAll('[class*="faq" i], [class*="question" i], [class*="accordion" i]')
      .forEach((el, idx) => {
        // Prefer a heading inside the FAQ block if present
        const inner = el.querySelector('h2, h3, h4, [class*="title" i], [class*="question" i]');
        const text = cleanText((inner || el).textContent);
        if (text.includes('?') && isPlausibleQuery(text)) {
          out.push(makeCandidate({
            id: `ehealth-${slug}-faq-${idx}`,
            query: text,
            source: 'ehealth',
            intent: 'low',
            intentScore: 4,
            category: 'authority_builders',
          }));
        }
      });

    return out;
  }

  async function scrapeEhealth() {
    const all = [];
    for (const url of EHEALTH_PAGES) {
      try {
        const queries = await extractEhealthQueries(url);
        all.push(...queries);
      } catch (err) {
        console.warn(`[ehealth] ${url} failed:`, err.message);
      }
      await delay(REQUEST_DELAY_MS);
    }
    return dedupe(all);
  }

  // -------------------------------------------------------------------------
  // 4. Competitor scraper (via proxy, requires URL list)
  // -------------------------------------------------------------------------
  //
  // Takes an array of competitor URLs. Auto-discovery via Google search is
  // blocked without an API key — pass URLs in explicitly, or maintain a list
  // in the Command Center's Citation Monitor settings.

  async function extractCompetitorQueries(pageUrl) {
    const html = await fetchViaProxy(pageUrl);
    const doc = parseHTML(html);
    const out = [];
    const slug = pageUrl.replace(/\W+/g, '-').slice(0, 60);

    const h1 = cleanText(doc.querySelector('h1')?.textContent);
    if (isPlausibleQuery(h1)) {
      out.push(makeCandidate({
        id: `competitor-${slug}-h1`,
        query: h1,
        source: 'competitor',
        intent: 'high',
        intentScore: 7,
        category: 'county_city',
      }));
    }

    doc.querySelectorAll('h2').forEach((h, idx) => {
      const text = cleanText(h.textContent);
      if (isPlausibleQuery(text)) {
        out.push(makeCandidate({
          id: `competitor-${slug}-h2-${idx}`,
          query: text,
          source: 'competitor',
          intent: 'medium',
          intentScore: 6,
          category: 'authority_builders',
        }));
      }
    });

    return out;
  }

  async function scrapeCompetitors(competitorUrls) {
    const urls = Array.isArray(competitorUrls) ? competitorUrls : [];
    if (urls.length === 0) {
      console.info('[competitors] no URLs provided, skipping');
      return [];
    }

    const all = [];
    for (const url of urls) {
      try {
        const queries = await extractCompetitorQueries(url);
        all.push(...queries);
      } catch (err) {
        console.warn(`[competitors] ${url} failed:`, err.message);
      }
      await delay(REQUEST_DELAY_MS);
    }
    return dedupe(all);
  }

  // -------------------------------------------------------------------------
  // Orchestrator
  // -------------------------------------------------------------------------

  async function runAll(options = {}) {
    const { competitorUrls = [] } = options;
    console.log('[GHScrapers] starting all scrapers...');

    const results = await Promise.allSettled([
      scrapeReddit(),
      scrapeMedicareGov(),
      scrapeEhealth(),
      scrapeCompetitors(competitorUrls),
    ]);

    const labels = ['Reddit', 'medicare.gov', 'ehealth.com', 'Competitors'];
    const all = [];

    results.forEach((r, i) => {
      if (r.status === 'fulfilled') {
        console.log(`[GHScrapers] ✓ ${labels[i]}: ${r.value.length} queries`);
        all.push(...r.value);
      } else {
        console.error(`[GHScrapers] ✗ ${labels[i]} failed:`, r.reason);
      }
    });

    const deduped = dedupe(all);
    console.log(`[GHScrapers] total after dedupe: ${deduped.length} queries`);
    return deduped;
  }

  // -------------------------------------------------------------------------
  // Export to window
  // -------------------------------------------------------------------------

  window.GHScrapers = {
    runAll,
    scrapeReddit,
    scrapeMedicareGov,
    scrapeEhealth,
    scrapeCompetitors,
  };
})();

</script>

  const upvotes = (winner.upvotes || 0) + (loser.upvotes || 0);

    else {

      const loser = winner === existing ? q : existing;

// lib/countyLoader.js — Browser version with embedded county data
// Converted from Chat 1 TypeScript for single-file React app

// COUNTY_DATA will be inserted here (3148 lines)
// Format: { 'durham': {...}, 'wake': {...}, ... }

/**
 * Convert a county name to its slug.
 *   "Durham"      → "durham"
 *   "New Hanover" → "new-hanover"
 */
function countyNameToSlug(county) {
  return county.toLowerCase().replace(/\s+/g, '-');
}

/**
 * Load a single county by slug.
 * Returns: CountyData object or throws error
 */
async function loadCounty(slug) {
  if (!slug) {
    throw new Error('loadCounty: slug is required');
  }

  if (!/^[a-z0-9-]+$/.test(slug)) {
    throw new Error(`loadCounty: Invalid slug format: "${slug}"`);
  }

  const data = COUNTY_DATA[slug.toLowerCase()];
  
  if (!data) {
    throw new Error(`County "${slug}" not found in embedded data`);
  }

  return data;
}

/**
 * Return a sorted list of all county slugs.
 */
function getCountyList() {
  return Object.keys(COUNTY_DATA).sort();
}

/**
 * Load all counties.
 * Returns: Array of CountyData objects
 */
function loadAllCounties() {
  return getCountyList().map(slug => COUNTY_DATA[slug]);
}

// lib/templateEngine.js — Browser version
// Converted from Chat 1 TypeScript for single-file React app
//
// Variable replacement engine for county landing pages.
//
// Supported syntax:
//   {{field}}                           — simple field lookup
//   {{arrayField[N]}}                   — array index lookup
//   {{#each arrayField}}...{{/each}}    — block iteration
// ============================================================================

function getField(data, name) {
  // Synthetic computed field: county_slug
  //   "Durham"      → "durham"
  //   "New Hanover" → "new-hanover"
  if (name === 'county_slug') {
    return data.county.toLowerCase().replace(/\s+/g, '-');
  }
  if (!(name in data)) return undefined;
  return data[name];
}

// Counties NOT listed render as plain text — no broken links, no 404s.

const LIVE_COUNTY_URLS = new Map([

  ['wake',        'https://generationhealth.me/medicare-agents-in-wake-county-nc/'],

  // ['new-hanover', 'https://generationhealth.me/medicare-agents-in-new-hanover-county-nc/'],
]);

function getLiveCountyUrl(slug) {
  return LIVE_COUNTY_URLS.get(slug) ?? null;
}

/**
 * Render {{#each arrayField}}...{{/each}} blocks.
 * Inside the block body, {{this}} refers to the current string item.
 * For neighboring_counties: only confirmed-live pages get <a> tags.
 */
function renderEachBlocks(template, data) {
  const eachRegex = /\{\{#each\s+(\w+)\}\}([\s\S]*?)\{\{\/each\}\}/g;

  return template.replace(eachRegex, (_match, arrayName, body) => {
    const arr = getField(data, arrayName);
    if (!Array.isArray(arr)) {
      throw new Error(
        `{{#each ${arrayName}}} — field is not an array (got ${typeof arr})`
      );
    }

    const isNeighborBlock = arrayName === 'neighboring_counties';

    return arr
      .map((item) => {
        if (item === undefined || item === null) {
          throw new Error(`{{this}} — array item is null or undefined`);
        }
        const itemStr = String(item);
        const itemSlug = itemStr.toLowerCase().replace(/\s+/g, '-');

        // Live-page gate: only output <a> tags for confirmed live county pages
        if (isNeighborBlock) {
          const liveUrl = getLiveCountyUrl(itemSlug);
          if (!liveUrl) {
            // Page not live yet — skip entirely, no broken link, no grey button
            return '';
          }
          // Page is live — render as confirmed <a> link
          return `<a href="${liveUrl}" style="color: var(--gh-blue); text-decoration: none; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);">${itemStr}</a>`;
        }

        return body
          .replace(/\{\{this_slug\}\}/g, () => itemSlug)
          .replace(/\{\{this\}\}/g, () => itemStr);
      })
      .join('');
  });
}

/**
 * Replace {{arrayField[N]}} array index references.
 */
function renderArrayIndexes(template, data) {
  const arrayIndexRegex = /\{\{(\w+)\[(\d+)\]\}\}/g;

  return template.replace(arrayIndexRegex, (_match, name, indexStr) => {
    const arr = getField(data, name);
    if (!Array.isArray(arr)) {
      throw new Error(
        `{{${name}[${indexStr}]}} — field "${name}" is not an array (got ${typeof arr})`
      );
    }
    const index = parseInt(indexStr, 10);
    if (index < 0 || index >= arr.length) {
      throw new Error(
        `{{${name}[${indexStr}]}} — index ${index} out of bounds (array has ${arr.length} items)`
      );
    }
    const val = arr[index];
    if (val === undefined || val === null) {
      throw new Error(`{{${name}[${indexStr}]}} — element is null or undefined`);
    }
    return String(val);
  });
}

/**
 * Replace simple {{field}} references.
 * Arrays get joined with ", "
 */
function renderSimpleVars(template, data) {
  const varRegex = /\{\{(\w+)\}\}/g;

  return template.replace(varRegex, (_match, name) => {
    if (name === 'this' || name === 'this_slug') {
      throw new Error(`{{${name}}} found outside of an {{#each}} block`);
    }

    const val = getField(data, name);
    if (val === undefined || val === null) {
      throw new Error(`Unresolved template variable: {{${name}}}`);
    }

    if (Array.isArray(val)) {
      return val.join(', ');
    }

    if (typeof val === 'object') {
      throw new Error(`{{${name}}} resolved to an object — not supported`);
    }

    return String(val);
  });
}

/**
 * Main entry point. Render a template string against county data.
 */
function renderTemplate(template, data) {
  let output = renderEachBlocks(template, data);
  output = renderArrayIndexes(output, data);
  output = renderSimpleVars(output, data);
  return output;
}

/**
 * validator.ts
 *
 * County data + rendered HTML QA validator.
 *
 * Implements 11 validation rules, each returning a ValidationIssue on failure.
 * Chat 6 should treat any 'error' severity as a publish-blocker.
 *
 * Data rules (1-7): run against a CountyData object before rendering
 * Render rules (8-11): run against the output HTML after rendering
 */





const REQUIRED_STRING_FIELDS = [
  'county',
  'state',
  'state_abbr',
  'health_system',
  'population',
];

const REQUIRED_ARRAY_FIELDS = [
  'hospitals',
  'specialties',
  'neighboring_counties',
  'cities',
];

/**
 * Rule 1: All required string fields present and non-empty.
 * metro_area is excluded here because it can be "" for rural counties.
 */
function rule1_RequiredFields(data) {
  const issues = [];
  for (const field of REQUIRED_STRING_FIELDS) {
    const val = data[field];
    if (typeof val !== 'string' || val.trim() === '') {
      issues.push({
        rule: 1,
        name: 'RequiredFields',
        severity: 'error',
        message: `Missing or empty required field: ${field}`,
        field,
      });
    }
  }
  // metro_area must exist as a string, but can be empty
  if (typeof data.metro_area !== 'string') {
    issues.push({
      rule: 1,
      name: 'RequiredFields',
      severity: 'error',
      message: 'Field metro_area must be a string (use "" for rural counties)',
      field: 'metro_area',
    });
  }
  return issues;
}

/**
 * Rule 2: state must always be "North Carolina" and state_abbr "NC".
 */
function rule2_StateFields(data) {
  const issues = [];
  if (data.state !== 'North Carolina') {
    issues.push({
      rule: 2,
      name: 'StateFields',
      severity: 'error',
      message: `state must be "North Carolina", got "${data.state}"`,
      field: 'state',
    });
  }
  if (data.state_abbr !== 'NC') {
    issues.push({
      rule: 2,
      name: 'StateFields',
      severity: 'error',
      message: `state_abbr must be "NC", got "${data.state_abbr}"`,
      field: 'state_abbr',
    });
  }
  return issues;
}

/**
 * Rule 3: county must be Title Case.
 */
function rule3_CountyTitleCase(data) {
  if (typeof data.county !== 'string') return [];
  const words = data.county.split(/\s+/);
  for (const word of words) {
    if (word.length === 0) continue;
    if (word[0] !== word[0].toUpperCase()) {
      return [
        {
          rule: 3,
          name: 'CountyTitleCase',
          severity: 'error',
          message: `county "${data.county}" is not Title Case`,
          field: 'county',
        },
      ];
    }
  }
  return [];
}

/**
 * Rule 4: population must be a string of digits only (no commas, no "approx").
 */
function rule4_PopulationNumeric(data) {
  if (typeof data.population !== 'string') return [];
  if (!/^\d+$/.test(data.population)) {
    return [
      {
        rule: 4,
        name: 'PopulationNumeric',
        severity: 'error',
        message: `population "${data.population}" must be a string of digits only`,
        field: 'population',
      },
    ];
  }
  return [];
}

/**
 * Rule 5: All required array fields must be non-empty arrays of strings.
 * hospitals must have at least 1 entry (even for rural counties — use regional anchor).
 * neighboring_counties must have at least 1 entry.
 * cities must have at least 1 entry.
 * specialties should have at least 2 entries (cancer + heart at minimum, matching template).
 */
function rule5_ArrayFields(data) {
  const issues = [];
  const minLengths: Record<string, number> = {
    hospitals: 1,
    specialties: 2,
    neighboring_counties: 1,
    cities: 1,
  };

  for (const field of REQUIRED_ARRAY_FIELDS) {
    const val = data[field];
    if (!Array.isArray(val)) {
      issues.push({
        rule: 5,
        name: 'ArrayFields',
        severity: 'error',
        message: `${field} must be an array`,
        field,
      });
      continue;
    }
    const minLen = minLengths[field] ?? 1;
    if (val.length < minLen) {
      issues.push({
        rule: 5,
        name: 'ArrayFields',
        severity: 'error',
        message: `${field} must have at least ${minLen} entries (got ${val.length})`,
        field,
      });
    }
    // Every element must be a non-empty string
    val.forEach((item, i) => {
      if (typeof item !== 'string' || item.trim() === '') {
        issues.push({
          rule: 5,
          name: 'ArrayFields',
          severity: 'error',
          message: `${field}[${i}] is not a non-empty string`,
          field: `${field}[${i}]`,
        });
      }
    });
  }
  return issues;
}

/**
 * Rule 6: specialties ordering convention — specialties[0] should contain
 * "Cancer" and specialties[1] should contain "Heart" so the template renders
 * the cancer paragraph and heart paragraph with the correct facilities.
 */
function rule6_SpecialtiesOrdering(data) {
  const issues = [];
  if (!Array.isArray(data.specialties) || data.specialties.length < 2) return [];

  if (!/cancer/i.test(data.specialties[0])) {
    issues.push({
      rule: 6,
      name: 'SpecialtiesOrdering',
      severity: 'error',
      message: `specialties[0] "${data.specialties[0]}" should reference Cancer (template expects cancer first)`,
      field: 'specialties[0]',
    });
  }
  if (!/heart|cardio|cardiac/i.test(data.specialties[1])) {
    issues.push({
      rule: 6,
      name: 'SpecialtiesOrdering',
      severity: 'error',
      message: `specialties[1] "${data.specialties[1]}" should reference Heart/Cardiac (template expects heart second)`,
      field: 'specialties[1]',
    });
  }
  return issues;
}

/**
 * Rule 7: neighboring_counties entries must be Title Case strings, no
 * "County" suffix (we append that in the template).
 */
function rule7_NeighboringCountiesFormat(data) {
  const issues = [];
  if (!Array.isArray(data.neighboring_counties)) return issues;

  data.neighboring_counties.forEach((name, i) => {
    if (typeof name !== 'string') return;
    if (/\bCounty\b/i.test(name)) {
      issues.push({
        rule: 7,
        name: 'NeighboringCountiesFormat',
        severity: 'error',
        message: `neighboring_counties[${i}] "${name}" should not contain "County" suffix`,
        field: `neighboring_counties[${i}]`,
      });
    }
    const firstChar = name.trim()[0];
    if (firstChar && firstChar !== firstChar.toUpperCase()) {
      issues.push({
        rule: 7,
        name: 'NeighboringCountiesFormat',
        severity: 'error',
        message: `neighboring_counties[${i}] "${name}" must be Title Case`,
        field: `neighboring_counties[${i}]`,
      });
    }
  });
  return issues;
}

/**
 * Rule 8: Rendered HTML must contain no unresolved {{...}} template variables.
 */
function rule8_NoUnresolvedVars(html) {
  const matches = html.match(/\{\{[^}]+\}\}/g);
  if (matches && matches.length > 0) {
    return [
      {
        rule: 8,
        name: 'NoUnresolvedVars',
        severity: 'error',
        message: `Rendered HTML contains ${matches.length} unresolved variable(s): ${matches.slice(0, 3).join(', ')}${matches.length > 3 ? '...' : ''}`,
      },
    ];
  }
  return [];
}

/**
 * Rule 9: Rendered HTML must contain Rob's correct phone number.
 * Guards against the (828) 761-3324 typo bug.
 */
function rule9_CorrectPhoneNumber(html) {
  const issues = [];
  const correctPhone = '(828) 761-3326';
  const correctTel = 'tel:8287613326';
  const wrongPhone = '(828) 761-3324';
  const wrongTel = 'tel:8287613324';

  if (!html.includes(correctPhone) && !html.includes(correctTel)) {
    issues.push({
      rule: 9,
      name: 'CorrectPhoneNumber',
      severity: 'error',
      message: "Rendered HTML is missing Rob's phone number (828) 761-3326",
    });
  }
  if (html.includes(wrongPhone) || html.includes(wrongTel)) {
    issues.push({
      rule: 9,
      name: 'CorrectPhoneNumber',
      severity: 'error',
      message: 'Rendered HTML contains the WRONG phone number (828) 761-3324',
    });
  }
  return issues;
}

/**
 * Rule 10: No leftover Durham-specific content on non-Durham pages.
 *
 * Two tiers:
 *   - strictlyForbidden: Durham-only campus facilities (never allowed elsewhere)
 *   - contextualForbidden: "Duke Health" / "Duke Raleigh" are allowed IF the
 *     county's own JSON data references them (e.g. Wake County legitimately
 *     includes Duke Raleigh Hospital in its hospitals array).
 */
function rule10_NoLeftoverDurhamContent(html, data) {
  if (data.county === 'Durham') return [];

  const issues = [];
  // All Duke-named facilities are contextually forbidden. They may legitimately
  // appear on non-Durham county pages when Duke Health serves as the regional
  // referral system (e.g., Franklin, Granville, Person counties all use Duke
  // as their tertiary referral center). The validator allows these mentions
  // only if the county's own JSON data explicitly references them.
  const strictlyForbidden = [];
  const contextualForbidden = [
    'Duke Health',
    'Duke Raleigh',
    'Duke Regional',
    'Duke University Hospital',
    'Duke Cancer',
    'Duke Heart',
  ];

  for (const sub of strictlyForbidden) {
    if (html.includes(sub)) {
      issues.push({
        rule: 10,
        name: 'NoLeftoverDurhamContent',
        severity: 'error',
        message: `Rendered HTML for ${data.county} County contains leftover Durham content: "${sub}"`,
      });
    }
  }

  const dataBlob = JSON.stringify(data);
  for (const sub of contextualForbidden) {
    if (html.includes(sub) && !dataBlob.includes(sub)) {
      issues.push({
        rule: 10,
        name: 'NoLeftoverDurhamContent',
        severity: 'error',
        message: `Rendered HTML for ${data.county} County contains leftover Durham content: "${sub}" (not present in county data)`,
      });
    }
  }

  return issues;
}

/**
 * Rule 11: County name appears at least 3 times in rendered HTML.
 */
function rule11_CountyNameDensity(html, data) {
  const regex = new RegExp(`\\b${data.county}\\b`, 'g');
  const matches = html.match(regex);
  const count = matches ? matches.length : 0;

  if (count < 3) {
    return [
      {
        rule: 11,
        name: 'CountyNameDensity',
        severity: 'error',
        message: `Rendered HTML mentions "${data.county}" only ${count} time(s); expected at least 3`,
      },
    ];
  }
  return [];
}

/**
 * Validate county data + (optionally) rendered HTML.
 */
function validate(data, html?) {
  const issues = [
    ...rule1_RequiredFields(data),
    ...rule2_StateFields(data),
    ...rule3_CountyTitleCase(data),
    ...rule4_PopulationNumeric(data),
    ...rule5_ArrayFields(data),
    ...rule6_SpecialtiesOrdering(data),
    ...rule7_NeighboringCountiesFormat(data),
  ];

  if (html !== undefined) {
    issues.push(
      ...rule8_NoUnresolvedVars(html),
      ...rule9_CorrectPhoneNumber(html),
      ...rule10_NoLeftoverDurhamContent(html, data),
      ...rule11_CountyNameDensity(html, data)
    );
  }

  const hasErrors = issues.some((i) => i.severity === 'error');
  return {
    valid: !hasErrors,
    issues,
  };
}

  } catch {}
  return '';
}
function loadAllKeys() {

    if (raw) return JSON.parse(raw) || {};
  } catch {}

function QueueManagerPanel({ onQueriesGenerated, seeds = DEFAULT_SEEDS }) {
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(0);
  const [status, setStatus] = useState('');
  const [error, setError] = useState(null);
  const [lastResult, setLastResult] = useState(null);

  const handleGenerate = async () => {
    const apiKey = loadClaudeKey();
    if (!apiKey) {
      setError('No Claude API key found. Add one in the Settings tab first.');
      return;
    }
    setError(null); setGenerating(true); setProgress(0); setLastResult(null);
    setStatus('Expanding seed queries via Claude…');
    try {
      const expanded = await expandSeedQueries(seeds, apiKey, (current, total) => {
        setProgress(Math.round((current / total) * 70));
        setStatus(`Expanding seeds… ${current}/${total}`);
      });
      if (expanded.length === 0)
        throw new Error('Claude returned no variations. Check the console for API errors.');
      setStatus('Removing near-duplicates…'); setProgress(75);
      const deduped = deduplicateQueries(expanded);
      setStatus('Classifying intent and categories…'); setProgress(85);
      const classified = classifyIntent(deduped);
      setStatus('Sorting by intent score…'); setProgress(95);
      const sorted = [...classified].sort((a, b) => b.intentScore - a.intentScore);
      setProgress(100);
      setStatus(`Done — generated ${sorted.length} queries.`);
      const high = sorted.filter(q => q.intent === 'high').length;
      const medium = sorted.filter(q => q.intent === 'medium').length;
      const low = sorted.filter(q => q.intent === 'low').length;
      setLastResult({ total: sorted.length, high, medium, low });
      onQueriesGenerated(sorted);
    } catch (err) {
      console.error('[QueueManager]', err);
      setError(err instanceof Error ? err.message : String(err));
      setStatus('');
    } finally { setGenerating(false); }
  };

  return (
    <div className="card p-5 space-y-4" style={{ borderColor:'rgba(20,184,166,0.22)', borderWidth:2 }}>
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <div className="flex items-center gap-2">
            <Icon name="sparkles" size={16} style={{ color:'#2dd4bf' }} />
            <h3 className="text-sm font-bold text-white">Queue Manager</h3>
            <span style={{ fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4,
              background:'rgba(20,184,166,0.15)', color:'#2dd4bf', letterSpacing:'0.08em' }}>
              AEO 3.0
            </span>
          </div>
          <p className="text-[11px] mt-1" style={{ color:'var(--gh-text-muted)' }}>
            Expand {seeds.length} seeds into ~{seeds.length * 6} classified queries via Claude.
            Takes ~{Math.round((seeds.length * 1.2) / 6)}–{Math.round((seeds.length * 1.2) / 3)} minutes.
          </p>
        </div>
        <button
          onClick={handleGenerate}
          disabled={generating}
          style={{
            padding:'10px 18px', borderRadius:12, fontSize:12, fontWeight:700,
            background: generating ? 'rgba(255,255,255,0.08)' : 'linear-gradient(90deg,#14b8a6,#0071e3)',
            color:'#fff', border:'none', cursor: generating ? 'not-allowed' : 'pointer',
            opacity: generating ? 0.5 : 1,
          }}>
          {generating ? (
            <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
              <Icon name="loader-2" size={14} className="gh-spin" />
              Generating…
            </span>
          ) : `Generate ${seeds.length * 6} Queries`}
        </button>
      </div>

      {generating && (
        <div className="space-y-2">
          <div className="flex justify-between text-[11px]">
            <span style={{ color:'var(--gh-text-soft)' }}>{status}</span>
            <span style={{ color:'#2dd4bf', fontWeight:700, fontVariantNumeric:'tabular-nums' }}>{progress}%</span>
          </div>
          <div style={{ width:'100%', height:8, background:'rgba(255,255,255,0.06)', borderRadius:999, overflow:'hidden' }}>
            <div style={{ width: progress + '%', height:'100%',
              background:'linear-gradient(90deg,#14b8a6,#0071e3)', transition:'width 300ms' }} />
          </div>
        </div>
      )}

      {error && (
        <div style={{ display:'flex', gap:8, padding:12, borderRadius:10,
          background:'rgba(239,68,68,0.10)', border:'1px solid rgba(239,68,68,0.3)' }}>
          <Icon name="alert-circle" size={16} style={{ color:'#f87171', flexShrink:0, marginTop:2 }} />
          <div className="text-[11px]" style={{ color:'#fca5a5' }}>{error}</div>
        </div>
      )}

      {lastResult && !generating && !error && (
        <div className="grid grid-cols-4 gap-2">
          {[
            { label:'Total',  value:lastResult.total,  color:'#fff' },
            { label:'High',   value:lastResult.high,   color:'#f87171' },
            { label:'Medium', value:lastResult.medium, color:'#fbbf24' },
            { label:'Low',    value:lastResult.low,    color:'var(--gh-text-faint)' },
          ].map((s, i) => (
            <div key={i} className="card p-2 text-center">
              <div style={{ fontSize:18, fontWeight:800, color:s.color, fontVariantNumeric:'tabular-nums' }}>{s.value}</div>
              <div style={{ fontSize:9, fontWeight:700, color:'var(--gh-text-muted)', letterSpacing:'0.08em', textTransform:'uppercase' }}>{s.label}</div>
            </div>
          ))}
        </div>
      )}

      {!generating && !lastResult && (
        <div style={{ fontSize:10, color:'var(--gh-text-faint)' }}>
          <div style={{ fontWeight:700, color:'var(--gh-text-muted)', marginBottom:4 }}>Seeds:</div>
          <ul style={{ listStyle:'none', padding:0, margin:0 }}>
            {seeds.slice(0, 5).map((s, i) => (
              <li key={i} style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {i + 1}. {s.query}
              </li>
            ))}
            {seeds.length > 5 && <li>… and {seeds.length - 5} more</li>}
          </ul>
        </div>
      )}
    </div>
  );
}

            {LLM_ORDER.map(({ key, label }) => {
              const v = citation[key];
              const icon = v === true ? '✓' : v === false ? '✗' : '●';
              const color = v === true ? '#4ade80' : v === false ? '#ef4444' : '#6b7280';
              return (
                <span key={key} title={`${label}: ${v === true ? 'cited' : v === false ? 'not cited' : 'untested'}`}
                  style={{ color, fontSize:11, fontWeight:700, width:12, textAlign:'center',
                           animation: isTesting ? 'gh-pulse 1.2s ease-in-out infinite' : 'none' }}>
                  {icon}
                </span>
              );
            })}
          </div>
          {visibleCompetitors.map((c, i) => (
            <span key={`${c}-${i}`} title={competitors.join(', ')}
              style={{ padding:'2px 8px', borderRadius:10, background:'rgba(255,255,255,0.06)',
                       color:'#9ca3af', fontSize:10, fontWeight:500 }}>
              {c}
            </span>
          ))}
          {extraCompetitors > 0 && (
            <span title={competitors.join(', ')}
              style={{ padding:'2px 8px', borderRadius:10, background:'rgba(255,255,255,0.06)',
                       color:'#9ca3af', fontSize:10, fontWeight:600 }}>
              +{extraCompetitors} more
            </span>
          )}
          <span style={{ padding:'2px 8px', borderRadius:10, background:pipeline.bg,
                         color:pipeline.fg, fontSize:10, fontWeight:700,
                         letterSpacing:0.3, marginLeft:'auto' }}>
            {pipeline.label}
          </span>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:4,
                    opacity: hovered || selected ? 1 : 0.35, transition:'opacity 150ms' }}>
        <IconButton title="Test citation across 4 LLMs" onClick={() => onTest(query)}
          disabled={isTesting} ariaLabel="Test citation">
          <Icon name="test-tube" size={15} />
        </IconButton>
        <IconButton title={canGeneratePage ? 'Generate county landing page' : 'No county detected'}
          onClick={() => onGeneratePage(query)} disabled={!canGeneratePage || isTesting}
          ariaLabel="Generate page">
          <Icon name="file-text" size={15} />
        </IconButton>
        <IconButton title="Edit query" onClick={() => onEdit(query)} disabled={isTesting} ariaLabel="Edit query">
          <Icon name="edit-2" size={15} />
        </IconButton>
        <IconButton title="Reset to Not Built — regenerate with updated template"
          onClick={() => onRefresh(query.id)} disabled={isTesting} ariaLabel="Reset to Not Built">
          <Icon name="refresh-cw" size={15} />
        </IconButton>
      </div>
    </div>
  );
}

// ============================================================================
// PageGenerationModal (ported from chat5/PageGenerationModal.tsx)
// ============================================================================
const primaryBtnStyle = {
  display:'inline-flex', alignItems:'center', padding:'8px 16px',
  background:'#0071e3', color:'#fff', border:'none', borderRadius:8,
  fontSize:13, fontWeight:600, cursor:'pointer', transition:'background 150ms',
};
const secondaryBtnStyle = {
  display:'inline-flex', alignItems:'center', padding:'8px 14px',
  background:'rgba(255,255,255,0.06)', color:'#e5e7eb',
  border:'1px solid rgba(255,255,255,0.1)', borderRadius:8,
  fontSize:13, fontWeight:500, cursor:'pointer', transition:'background 150ms',
};
const selectStyle = {
  flex:1, padding:'8px 10px', background:'#111', color:'#fff',
  border:'1px solid rgba(255,255,255,0.15)', borderRadius:8, fontSize:13,
};

function StepIcon({ state }) {
  if (state === 'done') return <Icon name="check-circle" size={16} style={{ color:'#4ade80' }} />;
  if (state === 'error') return <Icon name="alert-circle" size={16} style={{ color:'#ef4444' }} />;
  if (state === 'running') return <Icon name="loader-2" size={16} className="gh-spin" style={{ color:'#60a5fa' }} />;
  return <div style={{ width:16, height:16, borderRadius:'50%', border:'2px solid #4b5563' }} />;
}
function StepCard({ title, state, content }) {
  return (
    <div style={{ marginBottom:10, padding:14, background:'rgba(255,255,255,0.03)',
      border: `1px solid ${state === 'error' ? 'rgba(239,68,68,0.3)'
                    : state === 'done' ? 'rgba(74,222,128,0.2)'
                    : 'rgba(255,255,255,0.08)'}`,
      borderRadius:10 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12,
        fontWeight:700, color:'#9ca3af', letterSpacing:0.3, marginBottom:8 }}>
        <StepIcon state={state} />
        {title.toUpperCase()}
      </div>
      <div style={{ fontSize:13, color:'#e5e7eb', paddingLeft:24 }}>{content}</div>
    </div>
  );
}
function MetaRow({ label, value, limit }) {
  const len = (value || '').length;
  const color = !limit ? '#9ca3af'
    : len === 0 ? '#ef4444'
    : len > limit ? '#ef4444'
    : len > limit * 0.9 ? '#fbbf24'
    : '#4ade80';
  return (
    <div style={{ marginBottom:8, fontSize:12 }}>
      <div style={{ color:'#6b7280', marginBottom:2 }}>
        {label} {limit && <span style={{ color }}>({len}/{limit})</span>}
      </div>
      <div style={{ color:'#e5e7eb', wordBreak:'break-word' }}>
        {value || <em style={{ color:'#4b5563' }}>—</em>}
      </div>
    </div>
  );
}

function PageGenerationModal({ query, onClose, onGenerated }) {
  const [detectStep, setDetectStep] = useState('pending');
  const [loadStep, setLoadStep] = useState('pending');
  const [generateStep, setGenerateStep] = useState('pending');
  const [validateStep, setValidateStep] = useState('pending');
  const [detectedCounty, setDetectedCounty] = useState(null);
  const [manualCounty, setManualCounty] = useState('');
  const [countyData, setCountyData] = useState(null);
  const [generatedHtml, setGeneratedHtml] = useState('');
  const [validation, setValidation] = useState({ errors:[], warnings:[] });
  const [errorMsg, setErrorMsg] = useState('');
  const [toast, setToast] = useState('');

  const countyList = useMemo(() => { try { return getCountyList(); } catch { return []; } }, []);
  const activeCounty = detectedCounty || manualCounty;

  const runPipeline = async (countyName) => {
    setErrorMsg('');
    setLoadStep('running');
    let data = null;
    try {
      const slug = countyName.toLowerCase().replace(/\s+/g, '-');
      data = await loadCounty(slug);
      if (!data) throw new Error('County data not found');
      setCountyData(data);
      setLoadStep('done');
    } catch (err) {
      setLoadStep('error');
      setErrorMsg(`County data not found for ${countyName}.`);
      return;
    }
    setGenerateStep('running');
    let html = '';
    try {
      html = renderTemplate(TEMPLATE_HTML, data);
      const countySlug = `medicare-agents-in-${countyName.toLowerCase().replace(/\s+/g, '-')}-county-nc`;
      html = injectRelatedGuides(html, countySlug);
      setGeneratedHtml(html);
      setGenerateStep('done');
    } catch (err) {
      setGenerateStep('error');
      setErrorMsg(`Generation failed: ${err && err.message || 'Unknown error'}`);
      return;
    }
    setValidateStep('running');
    try {
      const result = validate(data, html);
      setValidation({
        errors: result.issues.filter(i => i.severity === 'error').map(i => i.message),
        warnings: result.issues.filter(i => i.severity === 'warning').map(i => i.message),
      });
      setValidateStep('done');
    } catch (err) {
      setValidateStep('error');
      setErrorMsg(`Validation failed: ${err && err.message || 'Unknown error'}`);
    }
  };

  useEffect(() => {
    setDetectStep('running');
    try {
      const c = query.county || extractCounty(query.query);
      if (c) {
        setDetectedCounty(c);
        setDetectStep('done');
        runPipeline(c);
      } else {
        setDetectStep('error');
        setErrorMsg('No county detected in query. Please select a NC county manually below.');
      }
    } catch (err) {
      setDetectStep('error');
      setErrorMsg(`Detection failed: ${err && err.message || 'Unknown error'}`);
    }
  }, []);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const handleManualCountySubmit = () => {
    if (!manualCounty) return;
    setDetectedCounty(manualCounty);
    setDetectStep('done');
    setLoadStep('pending'); setGenerateStep('pending'); setValidateStep('pending');
    setErrorMsg('');
    runPipeline(manualCounty);
  };

  const metadata = useMemo(() => {
    if (!generatedHtml) return null;
    const titleMatch = generatedHtml.match(/<title>([^<]*)<\/title>/i);
    const h1Match = generatedHtml.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
    const descMatch = generatedHtml.match(/<meta\s+name=["']description["']\s+content=["']([^"']*)["']/i);
    return {
      title: (titleMatch && titleMatch[1] || '').trim(),
      h1: (h1Match && h1Match[1] || '').replace(/<[^>]+>/g, '').trim(),
      description: (descMatch && descMatch[1] || '').trim(),
      length: generatedHtml.length,
    };
  }, [generatedHtml]);

  const canDownload = validateStep === 'done' && validation.errors.length === 0 && generatedHtml.length > 0;

  const handleDownload = () => {
    if (!canDownload || !activeCounty) return;
    const slug = activeCounty.toLowerCase().replace(/\s+/g, '-');
    const filename = `medicare-broker-${slug}-nc.html`;
    const blob = new Blob([generatedHtml], { type:'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (onGenerated) onGenerated({ ...query, county: activeCounty, pipelineStatus:'built',
      lastBuilt: new Date().toISOString() });
    setToast('Downloaded — pipeline status: BUILT');
    setTimeout(() => setToast(''), 2000);
  };
  const handleCopy = async () => {
    if (!canDownload) return;
    try {
      await navigator.clipboard.writeText(generatedHtml);
      setToast('HTML copied to clipboard!');
      setTimeout(() => setToast(''), 2000);
      if (onGenerated && activeCounty) onGenerated({ ...query, county: activeCounty,
        pipelineStatus:'built', lastBuilt: new Date().toISOString() });
    } catch {
      setToast('Copy failed — browser blocked clipboard');
      setTimeout(() => setToast(''), 2500);
    }
  };

  return (
    <div role="dialog" aria-modal="true"
      onClick={(e) => e.target === e.currentTarget && onClose()}
      style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)',
        backdropFilter:'blur(4px)', display:'flex', alignItems:'center',
        justifyContent:'center', zIndex:9999, padding:20 }}>
      <div style={{ width:'100%', maxWidth:640, maxHeight:'90vh', overflowY:'auto',
        background:'#1f1f1f', border:'1px solid rgba(255,255,255,0.1)',
        borderRadius:14, boxShadow:'0 25px 60px rgba(0,0,0,0.5)', color:'#fff' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'18px 22px', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
          <h2 style={{ margin:0, fontSize:17, fontWeight:600 }}>Generate Page for Query</h2>
          <button onClick={onClose} aria-label="Close"
            style={{ background:'transparent', border:'none', color:'#9ca3af',
              cursor:'pointer', padding:4, borderRadius:6 }}>
            <Icon name="x" size={20} />
          </button>
        </div>
        <div style={{ padding:22 }}>
          <div style={{ padding:'10px 14px', background:'rgba(0,113,227,0.08)',
            border:'1px solid rgba(0,113,227,0.2)', borderRadius:8,
            fontSize:13, color:'#cbd5e1', marginBottom:16 }}>
            <span style={{ color:'#6b7280', marginRight:8 }}>Query:</span>
            "{query.query}"
          </div>

          <StepCard title="Step 1: County Detection" state={detectStep}
            content={
              detectStep === 'done' && detectedCounty
                ? <span>Detected: <strong>{detectedCounty} County</strong></span>
                : detectStep === 'error' ? (
                  <div>
                    <div style={{ marginBottom:10, color:'#fca5a5' }}>
                      No county detected. Select manually:
                    </div>
                    <div style={{ display:'flex', gap:8 }}>
                      <select value={manualCounty} onChange={(e) => setManualCounty(e.target.value)} style={selectStyle}>
                        <option value="">Choose NC county…</option>
                        {countyList.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                      <button onClick={handleManualCountySubmit} disabled={!manualCounty}
                        style={{ ...primaryBtnStyle, opacity: manualCounty ? 1 : 0.4,
                          cursor: manualCounty ? 'pointer' : 'not-allowed' }}>
                        Continue
                      </button>
                    </div>
                  </div>
                ) : <span style={{ color:'#9ca3af' }}>Detecting county…</span>
            } />

          <StepCard title="Step 2: County Data" state={loadStep}
            content={
              loadStep === 'done' && countyData ? (
                <div style={{ fontSize:13, color:'#cbd5e1' }}>
                  <div>Loaded: <strong>{countyData.county} County</strong></div>
                  {countyData.health_system && (
                    <div style={{ color:'#9ca3af', marginTop:2 }}>Health System: {countyData.health_system}</div>
                  )}
                  {countyData.hospitals && countyData.hospitals.length > 0 && (
                    <div style={{ color:'#9ca3af' }}>Hospitals: {countyData.hospitals.length} found</div>
                  )}
                </div>
              ) : loadStep === 'running' ? <span style={{ color:'#9ca3af' }}>Loading county data…</span>
                : loadStep === 'error' ? <span style={{ color:'#fca5a5' }}>{errorMsg || 'Load failed'}</span>
                : <span style={{ color:'#6b7280' }}>Waiting…</span>
            } />

          <StepCard title="Step 3: Generate Page" state={generateStep}
            content={
              generateStep === 'done'
                ? <span>Page generated (<strong>{generatedHtml.length.toLocaleString()}</strong> characters)</span>
                : generateStep === 'running' ? <span style={{ color:'#9ca3af' }}>Generating HTML…</span>
                : generateStep === 'error'   ? <span style={{ color:'#fca5a5' }}>{errorMsg || 'Generation failed'}</span>
                : <span style={{ color:'#6b7280' }}>Waiting…</span>
            } />

          <StepCard title="Step 4: Validation" state={validateStep}
            content={
              validateStep === 'done' ? (
                <div style={{ fontSize:13 }}>
                  <div style={{ color:'#cbd5e1', marginBottom:8 }}>
                    {validation.errors.length === 0 ? '✓' : '✗'} Validation{' '}
                    {validation.errors.length === 0 ? 'passed' : 'failed'} (
                    <span style={{ color: validation.errors.length ? '#fca5a5' : '#4ade80' }}>
                      {validation.errors.length} errors
                    </span>, <span style={{ color: validation.warnings.length ? '#fbbf24' : '#9ca3af' }}>
                      {validation.warnings.length} warnings
                    </span>)
                  </div>
                  {validation.errors.map((e, i) => (
                    <div key={i} style={{ color:'#fca5a5', fontSize:12, marginTop:2 }}>✗ {e}</div>
                  ))}
                  {validation.warnings.map((w, i) => (
                    <div key={i} style={{ color:'#fbbf24', fontSize:12, marginTop:2 }}>⚠ {w}</div>
                  ))}
                </div>
              ) : validateStep === 'running' ? <span style={{ color:'#9ca3af' }}>Validating…</span>
                : <span style={{ color:'#6b7280' }}>Waiting…</span>
            } />

          {metadata && validateStep === 'done' && (
            <div style={{ marginTop:14, padding:14, background:'rgba(255,255,255,0.03)',
              border:'1px solid rgba(255,255,255,0.08)', borderRadius:10 }}>
              <div style={{ fontSize:11, fontWeight:700, color:'#9ca3af',
                letterSpacing:0.5, marginBottom:10 }}>METADATA PREVIEW</div>
              <MetaRow label="Title" value={metadata.title} limit={60} />
              <MetaRow label="H1" value={metadata.h1} />
              <MetaRow label="Meta Description" value={metadata.description} limit={160} />
            </div>
          )}
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end',
          gap:10, padding:'14px 22px', borderTop:'1px solid rgba(255,255,255,0.08)',
          background:'rgba(0,0,0,0.15)' }}>
          {toast && <div style={{ marginRight:'auto', color:'#4ade80', fontSize:13 }}>{toast}</div>}
          <button onClick={onClose} style={secondaryBtnStyle}>Cancel</button>
          <button onClick={handleCopy} disabled={!canDownload}
            style={{ ...secondaryBtnStyle, opacity: canDownload ? 1 : 0.4,
              cursor: canDownload ? 'pointer' : 'not-allowed' }}>
            <Icon name="copy" size={14} style={{ marginRight:6 }} />
            Copy to Clipboard
          </button>
          <button onClick={handleDownload} disabled={!canDownload}
            style={{ ...primaryBtnStyle, opacity: canDownload ? 1 : 0.4,
              cursor: canDownload ? 'pointer' : 'not-allowed' }}>
            <Icon name="download" size={14} style={{ marginRight:6 }} />
            Download HTML
          </button>
        </div>
      </div>
    </div>
  );
}
</script>

<script type="text/babel" data-presets="env,react">
// ============================================================================
// CitationMonitorPanel — main container with 4 tabs
//   Tabs: Queue | Generate | Scrape | Settings
//   Persistence: gh-cc-query-queue-v3 (queue) + gh-cc-cm-apikeys (keys)
// ============================================================================

const TABS = [
  { id:'queue',    label:'Queue',    icon:'list' },
  { id:'generate', label:'Generate', icon:'sparkles' },
  { id:'scrape',   label:'Scrape',   icon:'download-cloud' },
  { id:'settings', label:'Settings', icon:'settings' },
];

function loadQueueFromLS() {
  try {
    const raw = localStorage.getItem(LS_QUEUE);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) return parsed;
    }
  } catch {}
  return [];
}
function saveQueueToLS(queue) {
  try { localStorage.setItem(LS_QUEUE, JSON.stringify(queue)); } catch (e) {
    console.error('[CitationMonitor] localStorage write failed:', e);
  }
}

// ============================================================================
// Filter bar subcomponent
// ============================================================================
const INTENT_FILTERS = [
  { id:'all',    label:'All' },
  { id:'high',   label:'High' },
  { id:'medium', label:'Medium' },
  { id:'low',    label:'Low' },
];
const PIPELINE_FILTERS = [
  { id:'all',       label:'All stages' },
  { id:'not_built', label:'Not built' },
  { id:'built',     label:'Built' },
  { id:'promoted',  label:'Promoted' },
  { id:'indexed',   label:'Indexed' },
];
const SOURCE_FILTERS = [
  { id:'all',            label:'All sources' },
  { id:'seed_expansion', label:'Seed' },
  { id:'reddit',         label:'Reddit' },
  { id:'medicare_gov',   label:'Medicare.gov' },
  { id:'ehealth',        label:'eHealth' },
  { id:'competitor',     label:'Competitor' },
  { id:'manual',         label:'Manual' },
];

function FilterPill({ active, onClick, children }) {
  return (
    <button onClick={onClick}
      style={{
        padding:'6px 12px', borderRadius:999, fontSize:11, fontWeight:600,
        background: active ? 'rgba(0,113,227,0.22)' : 'rgba(255,255,255,0.04)',
        color: active ? '#60a5fa' : '#cbd5e1',
        border: `1px solid ${active ? 'rgba(0,113,227,0.4)' : 'rgba(255,255,255,0.08)'}`,
        cursor:'pointer', transition:'all 150ms',
      }}>
      {children}
    </button>
  );
}

// ============================================================================
// QueueTab — list + filters + bulk actions + search
// ============================================================================
function QueueTab({ queue, setQueue, apiKeys }) {
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [search, setSearch] = useState('');
  const [intentFilter, setIntentFilter] = useState('all');
  const [pipelineFilter, setPipelineFilter] = useState('all');
  const [sourceFilter, setSourceFilter] = useState('all');
  const [sortBy, setSortBy] = useState('intentScore'); // intentScore | dateAdded | query
  const [testingIds, setTestingIds] = useState(new Set());
  const [batchProgress, setBatchProgress] = useState(null); // { current, total, queryText }
  const [modalQuery, setModalQuery] = useState(null);
  const lastClickedIdRef = useRef(null);

  // ---- filtering + sorting ----
  const filtered = useMemo(() => {
    let out = queue.slice();
    if (search.trim()) {
      const s = search.trim().toLowerCase();
      out = out.filter(q =>
        q.query.toLowerCase().includes(s) ||
        (q.county || '').toLowerCase().includes(s) ||
        (q.category || '').toLowerCase().includes(s)
      );
    }
    if (intentFilter !== 'all')   out = out.filter(q => q.intent === intentFilter);
    if (pipelineFilter !== 'all') out = out.filter(q => (q.pipelineStatus || 'not_built') === pipelineFilter);
    if (sourceFilter !== 'all')   out = out.filter(q => q.source === sourceFilter);
    out.sort((a, b) => {
      if (sortBy === 'intentScore') return (b.intentScore || 0) - (a.intentScore || 0);
      if (sortBy === 'dateAdded')   return (b.dateAdded || '').localeCompare(a.dateAdded || '');
      if (sortBy === 'query')       return a.query.localeCompare(b.query);
      return 0;
    });
    return out;
  }, [queue, search, intentFilter, pipelineFilter, sourceFilter, sortBy]);

  // ---- stats ----
  const stats = useMemo(() => {
    const total = queue.length;
    const tested = queue.filter(q => {
      const s = q.citationStatus || {};
      return s.claude !== null || s.chatgpt !== null || s.perplexity !== null || s.gemini !== null;
    }).length;
    const cited = queue.filter(q => {
      const s = q.citationStatus || {};
      return s.claude === true || s.chatgpt === true || s.perplexity === true || s.gemini === true;
    }).length;
    const high = queue.filter(q => q.intent === 'high').length;
    const built = queue.filter(q => ['built','promoted','indexed'].includes(q.pipelineStatus)).length;
    return { total, tested, cited, high, built };
  }, [queue]);

  const allSelected = filtered.length > 0 && filtered.every(q => selectedIds.has(q.id));

  // ---- selection ----
  const handleSelect = (id, selected, shiftKey) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (shiftKey && lastClickedIdRef.current) {
        const ids = filtered.map(q => q.id);
        const fromIdx = ids.indexOf(lastClickedIdRef.current);
        const toIdx   = ids.indexOf(id);
        if (fromIdx !== -1 && toIdx !== -1) {
          const [lo, hi] = fromIdx < toIdx ? [fromIdx, toIdx] : [toIdx, fromIdx];
          for (let i = lo; i <= hi; i++) next.add(ids[i]);
        }
      } else {
        if (selected) next.add(id); else next.delete(id);
      }
      lastClickedIdRef.current = id;
      return next;
    });
  };
  const handleSelectAll = () => {
    if (allSelected) setSelectedIds(new Set());
    else setSelectedIds(new Set(filtered.map(q => q.id)));
  };

  // ---- mutations ----
  const handleDelete = (id) => {
    setQueue(q => q.filter(x => x.id !== id));
    setSelectedIds(prev => { const n = new Set(prev); n.delete(id); return n; });
  };
  const handleRefresh = (id) => {
    setQueue(q => q.map(x => x.id === id
      ? { ...x, pipelineStatus: 'not_built', lastBuilt: null }
      : x
    ));
  };
  const handleBulkDelete = () => {
    if (selectedIds.size === 0) return;
    if (!confirm(`Delete ${selectedIds.size} queries?`)) return;
    setQueue(q => q.filter(x => !selectedIds.has(x.id)));
    setSelectedIds(new Set());
  };
  const handleEdit = (query) => {
    const next = prompt('Edit query:', query.query);
    if (next == null || !next.trim() || next === query.query) return;
    setQueue(q => q.map(x => x.id === query.id
      ? classifyIntent([{ ...x, query: next.trim() }])[0]
      : x));
  };
  const handleClear = () => {
    if (queue.length === 0) return;
    if (!confirm(`Clear all ${queue.length} queries?`)) return;
    setQueue([]);
    setSelectedIds(new Set());
  };

  // ---- citation testing ----
  const hasAnyKey = apiKeys.claude || apiKeys.chatgpt || apiKeys.perplexity || apiKeys.gemini;

  const handleTestOne = async (query) => {
    if (!hasAnyKey) { alert('Add at least one LLM API key in Settings first.'); return; }
    setTestingIds(prev => new Set(prev).add(query.id));
    try {
      const [updated] = await testCitations([query], apiKeys);
      setQueue(q => q.map(x => x.id === query.id ? updated : x));
    } catch (err) {
      console.error('[CitationMonitor] test failed:', err);
      alert('Test failed: ' + (err && err.message || err));
    } finally {
      setTestingIds(prev => { const n = new Set(prev); n.delete(query.id); return n; });
    }
  };
  const handleTestSelected = async () => {
    if (!hasAnyKey) { alert('Add at least one LLM API key in Settings first.'); return; }
    if (selectedIds.size === 0) { alert('No queries selected.'); return; }
    const targets = queue.filter(q => selectedIds.has(q.id));
    setTestingIds(new Set(targets.map(q => q.id)));
    setBatchProgress({ current:0, total: targets.length, queryText:'' });
    try {
      const updated = await batchTestWithProgress(targets, apiKeys, (current, total, queryText) => {
        setBatchProgress({ current, total, queryText });
      });
      const byId = new Map(updated.map(u => [u.id, u]));
      setQueue(q => q.map(x => byId.get(x.id) || x));
    } catch (err) {
      console.error('[CitationMonitor] batch test failed:', err);
      alert('Batch test failed: ' + (err && err.message || err));
    } finally {
      setTestingIds(new Set());
      setBatchProgress(null);
    }
  };

  const handleGeneratePage = (query) => { setModalQuery(query); };
  const handlePageGenerated = (updated) => {
    setQueue(q => q.map(x => x.id === updated.id ? updated : x));
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(queue, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `gh-queue-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="space-y-4">
      {/* Stats strip */}
      <div className="grid grid-cols-5 gap-2">
        {[
          { label:'Total',  value:stats.total,  color:'#fff' },
          { label:'Tested', value:stats.tested, color:'#60a5fa' },
          { label:'Cited',  value:stats.cited,  color:'#4ade80' },
          { label:'High',   value:stats.high,   color:'#f87171' },
          { label:'Built',  value:stats.built,  color:'#c084fc' },
        ].map((s, i) => (
          <div key={i} className="card p-3 text-center">
            <div style={{ fontSize:22, fontWeight:800, color:s.color, fontVariantNumeric:'tabular-nums' }}>
              {s.value}
            </div>
            <div style={{ fontSize:9, fontWeight:700, color:'var(--gh-text-muted)',
              letterSpacing:'0.08em', textTransform:'uppercase', marginTop:2 }}>
              {s.label}
            </div>
          </div>
        ))}
      </div>

      {/* Search + sort */}
      <div className="card p-3" style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <div style={{ position:'relative', flex:'1 1 260px', minWidth:220 }}>
          <Icon name="search" size={14} style={{ position:'absolute', left:10, top:'50%',
            transform:'translateY(-50%)', color:'#6b7280' }} />
          <input type="search" value={search} onChange={(e) => setSearch(e.target.value)}
            placeholder="Search queries, counties, categories…"
            style={{ width:'100%', paddingLeft:32 }} />
        </div>
        <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
          <option value="intentScore">Sort: Intent Score</option>
          <option value="dateAdded">Sort: Date Added</option>
          <option value="query">Sort: A–Z</option>
        </select>
        <button onClick={handleExport} style={{ ...secondaryBtnStyle, padding:'8px 12px' }}>
          <Icon name="download" size={13} style={{ marginRight:6 }} />
          Export JSON
        </button>
        <button onClick={handleClear} style={{ ...secondaryBtnStyle, padding:'8px 12px',
          color:'#fca5a5' }}>
          <Icon name="trash-2" size={13} style={{ marginRight:6 }} />
          Clear All
        </button>
      </div>

      {/* Filter pills */}
      <div className="card p-3" style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'center' }}>
        <div style={{ display:'flex', gap:6, alignItems:'center' }}>
          <span style={{ fontSize:10, fontWeight:700, color:'var(--gh-text-muted)',
            letterSpacing:'0.08em', textTransform:'uppercase' }}>Intent:</span>
          {INTENT_FILTERS.map(f => (
            <FilterPill key={f.id} active={intentFilter === f.id} onClick={() => setIntentFilter(f.id)}>
              {f.label}
            </FilterPill>
          ))}
        </div>
        <div style={{ display:'flex', gap:6, alignItems:'center' }}>
          <span style={{ fontSize:10, fontWeight:700, color:'var(--gh-text-muted)',
            letterSpacing:'0.08em', textTransform:'uppercase' }}>Stage:</span>
          <select value={pipelineFilter} onChange={(e) => setPipelineFilter(e.target.value)}>

        </div>
        <div style={{ display:'flex', gap:6, alignItems:'center' }}>

            letterSpacing:'0.08em', textTransform:'uppercase' }}>Source:</span>
          <select value={sourceFilter} onChange={(e) => setSourceFilter(e.target.value)}>

        </div>
      </div>

      {/* Bulk action bar */}
      {selectedIds.size > 0 && (

          borderColor:'rgba(0,113,227,0.35)', background:'rgba(0,113,227,0.06)' }}>

            <Icon name="trash-2" size={13} style={{ marginRight:6 }} />

          </button>

      {/* Batch progress */}
      {batchProgress && (
        <div className="card p-3" style={{ borderColor:'rgba(0,113,227,0.35)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:11,

            <span style={{ color:'#60a5fa', fontWeight:700 }}>
              {batchProgress.current} / {batchProgress.total}

      <div className="card" style={{ overflow:'hidden' }}>

        ) : (
          filtered.map(q => (
            <QueryRow key={q.id} query={q}

              onEdit={handleEdit}

      {/* Generation modal */}
      {modalQuery && (
        <PageGenerationModal query={modalQuery}
          onClose={() => setModalQuery(null)}
          onGenerated={handlePageGenerated} />
      )}
    </div>
  );
}

// ============================================================================
// GenerateTab — QueueManagerPanel wrapper (merges results into queue)
// ============================================================================
function GenerateTab({ queue, setQueue }) {
  const [lastMerge, setLastMerge] = useState(null);

  const handleGenerated = (newQueries) => {
    // Merge into existing queue with dedup across old+new
    const combined = [...queue, ...newQueries];
    const deduped = deduplicateQueries(combined);
    setQueue(deduped);
    setLastMerge({
      generated: newQueries.length,
      addedAfterDedup: deduped.length - queue.length,
      totalNow: deduped.length,
    });
  };

  return (
    <div className="space-y-4">
      <QueueManagerPanel onQueriesGenerated={handleGenerated} />
      {lastMerge && (
        <div className="card p-4" style={{ borderColor:'rgba(74,222,128,0.22)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            <Icon name="check-circle" size={16} style={{ color:'#4ade80' }} />
            <strong style={{ fontSize:13, color:'#fff' }}>Merged into queue</strong>
          </div>
          <div style={{ fontSize:12, color:'var(--gh-text-soft)' }}>
            Generated <strong>{lastMerge.generated}</strong> queries ·
            Added <strong>{lastMerge.addedAfterDedup}</strong> after dedup ·
            Queue now has <strong>{lastMerge.totalNow}</strong> total.
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================================
// ScrapeTab — runs the four scraper functions from window.GHScrapers
// ============================================================================
const SCRAPE_SOURCES = [
  { id:'reddit',       label:'Reddit',       icon:'message-square',
    desc:'Scrapes r/Medicare and related subs for real-person questions.', fn:'scrapeReddit' },
  { id:'medicare_gov', label:'Medicare.gov', icon:'globe',
    desc:'Pulls FAQ/Help topics via the PHP scrape proxy.', fn:'scrapeMedicareGov' },
  { id:'ehealth',      label:'eHealth',      icon:'shopping-bag',
    desc:'Scrapes eHealthInsurance Medicare pages via proxy.', fn:'scrapeEhealth' },
  { id:'competitors',  label:'Competitors',  icon:'target',
    desc:'Scrapes competitor landing pages (configurable URLs).',
    fn:'scrapeCompetitors', needsUrls:true },
];

function ScrapeTab({ queue, setQueue }) {
  const [running, setRunning] = useState(null); // source id currently running
  const [log, setLog] = useState([]); // { source, count, ts, error? }
  const [competitorUrls, setCompetitorUrls] = useState(
    'https://www.boomerbenefits.com/medicare/\nhttps://www.ehealthinsurance.com/medicare/'
  );

  const appendLog = (entry) => setLog(l => [entry, ...l].slice(0, 20));

  const runScraper = async (source) => {
    const GH = window.GHScrapers;
    if (!GH || typeof GH[source.fn] !== 'function') {
      appendLog({ source: source.label, error: 'Scraper function not available', ts: new Date().toISOString() });
      return;
    }
    setRunning(source.id);
    try {
      const args = source.needsUrls
        ? [competitorUrls.split(/\r?\n/).map(s => s.trim()).filter(Boolean)]
        : [];
      const results = await GH[source.fn](...args);
      const arr = Array.isArray(results) ? results : [];

      // Run through intent classifier to score incoming candidates
      const classified = classifyIntent(arr);
      // Merge into queue + dedup
      const combined = [...queue, ...classified];
      const deduped = deduplicateQueries(combined);
      const added = deduped.length - queue.length;
      setQueue(deduped);

      appendLog({ source: source.label, count: arr.length, added,
        ts: new Date().toISOString() });
    } catch (err) {
      console.error('[Scrape]', err);
      appendLog({ source: source.label, error: String(err && err.message || err),
        ts: new Date().toISOString() });
    } finally {
      setRunning(null);
    }
  };

  const runAll = async () => {
    for (const source of SCRAPE_SOURCES) {
      await runScraper(source);
    }
  };

  const ghAvailable = !!window.GHScrapers;

  return (
    <div className="space-y-4">
      {!ghAvailable && (
        <div className="card p-3" style={{ background:'rgba(239,68,68,0.08)',
          borderColor:'rgba(239,68,68,0.3)' }}>
          <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
            <Icon name="alert-triangle" size={16} style={{ color:'#f87171', flexShrink:0 }} />
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:'#fca5a5' }}>
                window.GHScrapers not loaded
              </div>
              <div style={{ fontSize:11, color:'var(--gh-text-muted)', marginTop:2 }}>
                Check the browser console. The scraper IIFE should run before React mounts.
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="card p-4">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div>
            <h3 style={{ margin:0, fontSize:14, fontWeight:700, color:'#fff' }}>Scrape Sources</h3>
            <p style={{ fontSize:11, color:'var(--gh-text-muted)', marginTop:2 }}>
              Results are classified, deduped, and merged into the queue automatically.
            </p>
          </div>
          <button onClick={runAll} disabled={!ghAvailable || !!running}
            style={{ ...primaryBtnStyle, padding:'10px 16px',
              opacity: (!ghAvailable || running) ? 0.4 : 1,
              cursor: (!ghAvailable || running) ? 'not-allowed' : 'pointer' }}>
            <Icon name="play" size={13} style={{ marginRight:6 }} />
            Run All
          </button>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))', gap:10 }}>
          {SCRAPE_SOURCES.map(source => (
            <div key={source.id} style={{ padding:14, borderRadius:10,
              background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                <Icon name={source.icon} size={14} style={{ color:'#60a5fa' }} />
                <strong style={{ fontSize:13, color:'#fff' }}>{source.label}</strong>
              </div>
              <p style={{ fontSize:11, color:'var(--gh-text-muted)', marginBottom:10, minHeight:30 }}>
                {source.desc}
              </p>
              {source.needsUrls && (
                <textarea value={competitorUrls}
                  onChange={(e) => setCompetitorUrls(e.target.value)}
                  rows={3} style={{ width:'100%', fontSize:11, marginBottom:8 }}
                  placeholder="One URL per line" />
              )}
              <button onClick={() => runScraper(source)} disabled={!ghAvailable || !!running}
                style={{ ...secondaryBtnStyle, width:'100%', justifyContent:'center',
                  opacity: (!ghAvailable || running) ? 0.4 : 1 }}>
                {running === source.id ? (
                  <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
                    <Icon name="loader-2" size={12} className="gh-spin" />
                    Running…
                  </span>
                ) : (<>
                  <Icon name="download" size={12} style={{ marginRight:6 }} />
                  Run {source.label}
                </>)}
              </button>
            </div>
          ))}
        </div>
      </div>

      {log.length > 0 && (
        <div className="card p-4">
          <h3 style={{ margin:'0 0 10px', fontSize:12, fontWeight:700,
            color:'var(--gh-text-muted)', letterSpacing:'0.08em', textTransform:'uppercase' }}>
            Recent Runs
          </h3>
          <div style={{ fontFamily:'ui-monospace,monospace', fontSize:11 }}>
            {log.map((e, i) => (
              <div key={i} style={{ display:'flex', gap:8, padding:'4px 0',
                borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
                <span style={{ color:'#6b7280', minWidth:70 }}>
                  {e.ts.slice(11, 19)}
                </span>
                <span style={{ color:'#60a5fa', minWidth:90 }}>{e.source}</span>
                {e.error
                  ? <span style={{ color:'#fca5a5' }}>✗ {e.error}</span>
                  : <span style={{ color:'#4ade80' }}>
                      ✓ {e.count} queries{e.added != null && ` (+${e.added} after dedup)`}
                    </span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

                      <Icon name="x" size={14} />

        <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:18,
          paddingTop:14, borderTop:'1px solid rgba(255,255,255,0.06)' }}>
          <button onClick={handleSave} style={primaryBtnStyle}>
            <Icon name="save" size={13} style={{ marginRight:6 }} />

function getRelatedGuides(slug, currentPageSlug) {
  const slugLower = (slug || '').toLowerCase();
  const selfSlug = (currentPageSlug || slug || '').toLowerCase().replace(/\//g, '');
  let clusterKey = 'general';
  for (const { keywords, cluster } of GH_KEYWORD_CLUSTER_MAP) {
    if (keywords.some(kw => slugLower.includes(kw))) { clusterKey = cluster; break; }
  }
  const candidateSlugs = GH_CLUSTERS[clusterKey] || GH_CLUSTERS.general;
  const results = [];
  for (const candidateSlug of candidateSlugs) {
    if (results.length >= 8) break;
    if (candidateSlug === selfSlug) continue;
    if (!GH_LIVE_PAGES[candidateSlug]) continue;
    results.push({ url: `https://generationhealth.me/${candidateSlug}/`, label: GH_LIVE_PAGES[candidateSlug] });
  }
  if (results.length < 8) {
    for (const fallbackSlug of GH_CLUSTERS.general) {
      if (results.length >= 8) break;
      if (fallbackSlug === selfSlug) continue;
      if (results.some(r => r.url.includes(fallbackSlug))) continue;
      if (!GH_LIVE_PAGES[fallbackSlug]) continue;
      results.push({ url: `https://generationhealth.me/${fallbackSlug}/`, label: GH_LIVE_PAGES[fallbackSlug] });
    }
  }
  return results;
}

function injectRelatedGuides(html, slug) {
  const guides = getRelatedGuides(slug, slug);
  let result = html;
  guides.forEach((guide, i) => {
    const n = i + 1;
    result = result.replace(new RegExp(`https://generationhealth\\.me/\\[RELATED-SLUG-${n}\\]/`, 'g'), guide.url);
    result = result.replace(new RegExp(`\\[RELATED-SLUG-${n}\\]`, 'g'), guide.url.replace('https://generationhealth.me/','').replace(/\/$/,''));
    result = result.replace(new RegExp(`\\[RELATED GUIDE ${n}\\]`, 'g'), guide.label);
  });
  return result;
}
